<!DOCTYPE html>
<html lang="en">
	<head>
    	<meta charset="utf-8">

		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
		<title>Contact — Prawhn</title>

		<!-- external CSS link -->
		<link rel="stylesheet" href="css/normalize.css">
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<header>
    		<nav class="nav primary-nav">
				<ul>
					<li class="nav-logo"><a href="index.html"><img src="prawhn.png" alt="prawhn"></a></li>
					<li><a href="about.html">About</a></li>
					<li><a href="services.html">Services</a></li>
					<li class="nav-spacer"></li>
					<li class="nav-contact"><a href="contact.html">Contact</a></li>
				</ul>
			</nav>
		</header>
		<section class="contact-section pitch-section">
			<h1>contact.</h1>
			<h4>let's talk</h4>
			<form class="contact-form" action="#" method="post">
				<div class="form-group">
					<label for="name">Name</label>
					<input type="text" id="name" name="name" placeholder="Your name" required>
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" placeholder="your@email.com" required>
				</div>
				<div class="form-group">
					<label for="message">Message</label>
					<textarea id="message" name="message" rows="6" placeholder="Tell us about your project" required></textarea>
				</div>
				<button type="submit" class="btn btn-submit">Send message</button>
			</form>
		</section>
		<footer>
			<a href="contact.html" class="btn btn-footer">Contact</a>
			<a href="https://www.instagram.com/" class="footer-instagram" target="_blank" aria-label="Instagram">
				<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
			</a>
		</footer>
		<script type="text/javascript" src="js/main.js"></script>
